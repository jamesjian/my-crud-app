name: Deploy FastAPI to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build and Deploy Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        appSourcePath: ${{ github.workspace }}
        #registry name
        acrName: mycrudapp        
        containerAppName: my-toy-crud-app
        resourceGroup: my-free-tier-rg
            # Tell Azure how to name the image inside your registry:
        imageToBuild: mycrudapp.azurecr.io/my-toy-crud-app:${{ github.sha }}
        # Set a deployment location (e.g. eastus, westeurope, australiaeast)
        location: australiaeast
        acrUsername: ${{ secrets.ACR_USERNAME }}
        acrPassword: ${{ secrets.ACR_PASSWORD }}
        targetPort: 8000                 # <-- This forces Azure to route web traffic to your FastAPI 8000 port
        ingress: external
        environmentVariables: DATABASE_URL=${{ secrets.DATABASE_URL }}